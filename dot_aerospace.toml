# -*- mode: toml -*-

after-startup-command = [
    'exec-and-forget open -a /Applications/Google\ Chrome.app',
    'exec-and-forget open -a /Applications/Ghostty.app',
    'exec-and-forget open -a /Applications/Visual\ Studio\ Code.app',
    'exec-and-forget open -a /Applications/Obsidian.app',
    'exec-and-forget open -a /Applications/Slack.app',
]

start-at-login = true

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 30
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
automatically-unhide-macos-hidden-apps = false

[key-mapping]
preset = 'qwerty'

[gaps]
inner.horizontal = 0
inner.vertical =   0
outer.left =       0
outer.bottom =     0
outer.top =        0
outer.right =      0

[mode.main.binding]

# Layout
alt-slash = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion horizontal vertical'

# Focus
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# Move
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# Resize
alt-minus = 'resize smart -50'
alt-equal = 'resize smart +50'

# Fullscreen
alt-shift-f = 'fullscreen'

# Workspaces
alt-1 = 'workspace 1-Browser'
alt-2 = 'workspace 2-Terminal'
alt-3 = 'workspace 3-Code'
alt-4 = 'workspace 4-Notes'
alt-5 = 'workspace 5-Slack'
alt-6 = 'workspace 6-Etc'
alt-7 = 'workspace 7-Etc'

# Move to workspace
alt-shift-1 = 'move-node-to-workspace 1-Browser'
alt-shift-2 = 'move-node-to-workspace 2-Terminal'
alt-shift-3 = 'move-node-to-workspace 3-Code'
alt-shift-4 = 'move-node-to-workspace 4-Notes'
alt-shift-5 = 'move-node-to-workspace 5-Slack'
alt-shift-6 = 'move-node-to-workspace 6-Etc'
alt-shift-7 = 'move-node-to-workspace 7-Etc'

# Workspace navigation
alt-tab = 'workspace-back-and-forth'
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

# Service mode
alt-shift-semicolon = 'mode service'

# Quick app access
alt-b = 'exec-and-forget open -a /Applications/Google\ Chrome.app'
alt-c = 'exec-and-forget open -a /Applications/Visual\ Studio\ Code.app'
alt-f = 'exec-and-forget open -a /System/Library/CoreServices/Finder.app'
alt-t = 'exec-and-forget open -a /Applications/Ghostty.app'
alt-s = 'exec-and-forget open -a /Applications/Slack.app'
alt-n = 'exec-and-forget open -a /Applications/Obsidian.app'

[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main']
f = ['layout floating tiling', 'mode main']
backspace = ['close-all-windows-but-current', 'mode main']
alt-shift-h = ['join-with left', 'mode main']
alt-shift-j = ['join-with down', 'mode main']
alt-shift-k = ['join-with up', 'mode main']
alt-shift-l = ['join-with right', 'mode main']

# Auto-assign apps to workspaces
[[on-window-detected]]
if.app-id = 'com.google.Chrome'
run = 'move-node-to-workspace 1-Browser'

[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
run = 'move-node-to-workspace 2-Terminal'

[[on-window-detected]]
if.app-id = 'com.microsoft.VSCode'
run = 'move-node-to-workspace 3-Code'

[[on-window-detected]]
if.app-id = 'md.obsidian'
run = 'move-node-to-workspace 4-Notes'

[[on-window-detected]]
if.app-id = 'com.tinyspeck.slackmacgap'
run = 'move-node-to-workspace 5-Slack'
